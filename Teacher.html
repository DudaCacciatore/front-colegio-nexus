<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Professor</title>

    <link rel="icon" href="images/logo.svg">

    <link rel="stylesheet" href="Header.css">
    <link rel="stylesheet" href="Teacher.css">
    <link rel="stylesheet" href="PopUp.css">

    <script src="ApiMethods.js"></script>
</head>

<body>

    <div class="header">

        <div class="school-name">
            <img src="images/logo.svg">
            <h1>Colégio <span style="color:#2894AC;">Nexus</span></h1>
        </div>

        <div class="header-components">
            <h3><a href="Initial.html">Home</a></h3>
            <h3><a href="Initial.html#contact">Contatos</a></h3>
            <h3><a href="Login.html">Perfil</a></h3>
        </div>

    </div>


    <div class="main-content">


        <!-- AÇÕES -->

        <div class="actions">

            <section class="search">

                <img src="images/search.png">

                <form action="">
                    <input id="pesquisaMatricula" on type="text" placeholder="Pesquisar matrículas">
                    <button type="button" onclick="findStudent(document.getElementById('pesquisaMatricula').value)">Buscar</button>
                </form>
            </section>


            <section class="filter">

                <select>
                    <option>Disciplinas</option>
                    <option>Todas</option>
                    <option>Matemática</option>
                </select>

            </section>

        </div>


        <div class="students-info">
            <h1>Alunos</h1>
        </div>


        <!-- TABELA -->

        <table id="studentsTable" width="100%" border="1">

            <thead>

                <tr>
                    <th>Nome</th>
                    <th>Matrícula</th>
                    <th>Ações</th>
                </tr>

            </thead>

            <tbody id="tabela-alunos">
                <!-- JS preenche -->
            </tbody>

        </table>



        <!-- POPUP OBSERVAÇÃO -->

        <div id="popupInfo" class="popUp">

            <div class="popInfo">

                <h1>Observação</h1>

                <textarea id="textoObservacao" placeholder="Adicionar observação">
</textarea>

                <button onclick="adicionarObservacao()">
                    Adicionar
                </button>

                <button onclick="fecharPopup('popupInfo')">
                    Cancelar
                </button>

            </div>

        </div>



        <!-- POPUP NOTAS -->

        <div id="popupGrades" class="popUp">

            <div class="popGrades">

                <h1>Lançar Notas</h1>

                <section>
                    <h2>N1</h2>
                    <input id="nota1" type="number" required>
                </section>

                <section>
                    <h2>N2</h2>
                    <input id="nota2" type="number" required>
                </section>

                <section>
                    <h2>Média final</h2>
                    <input id="mediaFinal" type="number" required>
                </section>

                <button onclick="lancarNotas()">
                    Lançar
                </button>

                <button onclick="fecharPopup('popupGrades')">
                    Cancelar
                </button>

            </div>

        </div>


    </div>


    <!-- SCRIPT DA PÁGINA -->

    <script>

        const token = localStorage.getItem("token");

        if (!token) {

            alert("Você precisa fazer login");

            window.location.href = "Login.html";

        } else {

            listStudents();

        }


    </script>


</body>

</html>
