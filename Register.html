<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar</title>
    <link rel="icon" href="images/logo.svg">
    <link rel="stylesheet" href="Header.css">
    <link rel="stylesheet" href="Register.css">
    <script src="ApiMethods.js"></script>
</head>

<body>
    <!-- Header -->
    <div class="header">
        <div class="school-name">
            <img src="images/logo.svg" alt="">
            <h1>Colégio <span style="color: #2894AC;">Nexus</span></h1>
        </div>
        <div class="header-components">
            <h3><a href="Initial.html">Home</a></h3>
            <h3><a href="Initial.html#contact">Contatos</a></h3>
            <h3><a href="Login.html">Perfil</a></h3>
        </div>
    </div>

    <!-- Main Content -->
    <container class="main-content">

        <!-- Sing-In -->
        <div class="signIn">
            <div id="signIn-forms">
                <h1>Bem vindo(a)!</h1>
                <form onsubmit="handleRegister(event)">
                    <input type="text" id="fullName" placeholder="Nome completo" required>
                    <input type="text" id="registration" placeholder="Matrícula" required>
                    <input type="email" id="email" placeholder="E-mail" required>
                    <input type="password" id="password" placeholder="Senha" required>
                    <button type="submit">Cadastrar</button>
                </form>
            </div>
            <img src="images/sign_in.png" alt="">
        </div>
    </container>

    <script>
        function handleRegister(event) {
            event.preventDefault();
            const fullName = document.getElementById("fullName").value;
            const registration = document.getElementById("registration").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            registerStudent(fullName, registration, email, password);
        }

    </script>
</body>

</html>
