<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Área do Administrador</title>

  <link rel="stylesheet" href="Header.css">
  <link rel="stylesheet" href="Admin.css">
  <link rel="stylesheet" href="Tables.css">
  <link rel="stylesheet" href="PopUp.css">

  <link rel="icon" href="images/logo.svg">

  <script src="ApiMethods.js"></script>
</head>

<body>

  <!-- HEADER -->

  <div class="header">

    <div class="school-name">
      <img src="images/logo.svg">
      <h1>Colégio <span style="color:#2894AC;">Nexus</span></h1>
    </div>

    <div class="header-components">
      <h3><a href="Initial.html">Home</a></h3>
      <h3><a href="Initial.html#contact">Contatos</a></h3>
      <h3><a href="Login.html">Perfil</a></h3>
    </div>

  </div>



  <!-- MAIN -->

  <container class="main-content">

    <div class="tabs">
      <button onclick="showSection('admins', this)" class="active">Administradores</button>
      <button onclick="showSection('professores', this)">Professores</button>
      <button onclick="showSection('alunos', this)">Alunos</button>
    </div>



    <!-- ADMINS -->

    <div id="admins" class="secao">

      <div class="actionButton">
        <button onclick="abrirPopup('popupAdm')">
          Cadastrar Admin
        </button>
      </div>

      <div class="table-container">

        <table>

          <thead>
            <tr>
              <th>ID</th>
              <th>Usuário</th>
              <th>Ações</th>
            </tr>
          </thead>

          <tbody id="tabela-admins"></tbody>

        </table>

      </div>

    </div>


    <!-- POPUP ADMIN -->

    <div id="popupAdm" class="popUp">

      <div class="popRegister">

        <h1>Cadastrar Admin</h1>

        <form onsubmit="cadastrarAdmin(event)">

          <section>
            <h2>Usuário</h2>
            <input id="adminUsuario" type="text" required>
          </section>

          <section>
            <h2>Senha</h2>
            <input id="adminSenha" type="password" required>
          </section>

          <section>

            <button type="button" onclick="fecharPopup('popupAdm')">
              Cancelar
            </button>

            <button type="submit">
              Cadastrar
            </button>

          </section>

        </form>

      </div>

    </div>



    <!-- PROFESSORES -->

    <div id="professores" class="secao">

      <div class="actionButton">
        <button onclick="abrirPopup('popupProfessor')">
          Cadastrar Professor
        </button>
      </div>

      <div class="table-container">

        <table>

          <thead>
            <tr>
              <th>Professor</th>
              <th>Disciplina</th>
              <th>Usuário</th>
              <th>Ações</th>
            </tr>
          </thead>

          <tbody id="tabela-professores"></tbody>

        </table>

      </div>

    </div>


    <!-- POPUP PROFESSOR -->

    <div id="popupProfessor" class="popUp">

      <div class="popRegister">

        <h1>Cadastrar Professor</h1>

        <form onsubmit="cadastrarProfessor(event)">

          <section>
            <h2>Nome</h2>
            <input id="nomeProfessor" type="text" required>
          </section>

          <section>
            <h2>Disciplina</h2>
            <input id="disciplinaProfessor" type="text" required>
          </section>

          <section>
            <h2>Usuário</h2>
            <input id="usuarioProfessor" type="text" required>
          </section>

          <section>
            <h2>Senha</h2>
            <input id="senhaProfessor" type="password" required>
          </section>

          <section>

            <button type="button" onclick="fecharPopup('popupProfessor')">
              Cancelar
            </button>

            <button type="submit">
              Cadastrar
            </button>

          </section>

        </form>

      </div>

    </div>



    <!-- ALUNOS -->

    <div id="alunos" class="secao">

      <div class="actionButton">
        <button onclick="abrirPopup('popupAluno')">
          Cadastrar Aluno
        </button>
      </div>

      <div class="table-container">

        <table>

          <thead>
            <tr>
              <th>Nome</th>
              <th>Matrícula</th>
              <th>Email</th>
              <th>Ações</th>
            </tr>
          </thead>

          <tbody id="tabela-alunos"></tbody>

        </table>

      </div>

    </div>



    <!-- POPUP ALUNO -->

    <div id="popupAluno" class="popUp">

      <div class="popRegister">

        <h1>Cadastrar Aluno</h1>

        <form onsubmit="cadastrarAluno(event)">

          <section>
            <h2>Nome</h2>
            <input id="studentName" type="text" required>
          </section>

          <section>
            <h2>E-mail</h2>
            <input id="studentEmail" type="email" required>
          </section>

          <section>
            <h2>Senha</h2>
            <input id="studentPassword" type="password" required>
          </section>

          <section>

            <button type="button" onclick="fecharPopup('popupAluno')">
              Cancelar
            </button>

            <button type="submit">
              Cadastrar
            </button>

          </section>

        </form>

      </div>

    </div>

  </container>



  <script>

    window.onload = function () {

      const firstButton = document.querySelector(".tabs button");

      if (firstButton) {
        showSection("admins", firstButton);
      }

      listAdmins();
      listTeachers();
      listStudents();

    }

  </script>

</body>

</html>
