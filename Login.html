<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar</title>
    <link rel="icon" href="images/logo.svg">
    <link rel="stylesheet" href="Header.css">
    <link rel="stylesheet" href="Register.css">

    <script src="ApiMethods.js"></script>
</head>

<body>

    <!-- Header -->
    <div class="header">
        <div class="school-name">
            <img src="images/logo.svg" alt="">
            <h1>Colégio <span style="color: #2894AC;">Nexus</span></h1>
        </div>
        <div class="header-components">
            <h3><a href="Initial.html">Home</a></h3>
            <h3><a href="Initial.html#contact">Contatos</a></h3>
            <h3><a href="#">Perfil</a></h3>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">

        <!-- Sign-In -->
        <div class="signIn">
            <div id="signIn-forms">
                <h1>Entre na sua conta</h1>

                <form style="height: 60%;">
                    <input type="text" placeholder="Usuário/Matrícula" required>
                    <input type="password" placeholder="Senha" required>

                    <h4>
                        <u><a href="#">Esqueci a senha</a></u>
                    </h4>

                    <button type="submit">Entrar</button>

                    <h3>
                        <a href="Register.html">
                            Aluno novo?
                            <span style="font-style: oblique;">Cadastre-se</span>
                        </a>
                    </h3>
                </form>
            </div>

            <img src="images/sign_in.png" alt="">
        </div>

    </div>

    <!-- Script no final da página -->

    <script>
        const form = document.querySelector("#signIn-forms form");

        function verifyUser(user, password) {

            const emailRegexStudent = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const atStartRegexAdmin = /^@[a-zA-Z0-9_]+$/;
            const teacherRegex = /^[a-zA-Z0-9_]+\.[a-zA-Z0-9_]+$/;

            if (emailRegexStudent.test(user)) {

                loginStudent(user, password);

            }
            else if (atStartRegexAdmin.test(user)) {

                loginAdmin(user, password);

            }
            else if (teacherRegex.test(user)) {

                 (user, password);

            }
            else {

                alert("Formato de usuário inválido");

            }
        }

        form.addEventListener("submit", function (event) {
            event.preventDefault();

            const usuario = form.querySelector("input[type=text]").value;
            const senha = form.querySelector("input[type=password]").value;

            verifyUser(usuario, senha);
        });
    </script>

</body>

</html>
