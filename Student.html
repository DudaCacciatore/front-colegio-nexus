<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Aluno</title>

    <script src="ApiMethods.js"></script>

    <link rel="icon" href="images/logo.svg">
    <link rel="stylesheet" href="Header.css">
    <link rel="stylesheet" href="Student.css">

    <!-- jsPDF Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
</head>

<body>

    <!-- Header -->
    <div class="header">
        <div class="school-name">
            <img src="images/logo.svg" alt="">
            <h1>Colégio <span style="color: #2894AC;">Nexus</span></h1>
        </div>

        <div class="header-components">
            <h3><a href="Initial.html">Home</a></h3>
            <h3><a href="Initial.html#contact">Contatos</a></h3>
            <h3><a href="Login.html">Perfil</a></h3>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="actionButton"> <button id="boletimButtom">Gerar boletim</button> </div>
        <h1>Boletim</h1>
        <table id="boletim">
            <thead>
                <tr>
                    <th>Disciplina</th>
                    <th>N1</th>
                    <th>N2</th>
                    <th>Média</th>
                    <th>Situação</th>
                </tr>
            </thead> 
            <tbody id="tabela-alunos"></tbody>
        </table> <br>
        <h1>Observações</h1>
        <div id="observacoes-container" class="observacoes-container"></div>
    </div>

    <!-- Scripts -->
    <script src="Student.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            listarObservacoes();
        });

        // aparecer boletim
        onload = function () {
            mostrarBoletim();
        };
    </script>

</body>

</html>
